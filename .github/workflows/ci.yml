name: CI

on:
  push:
    branches: ["**"]      # run on every branch push
  pull_request:
    branches: [main]      # run on PRs targeting main

jobs:
  test:
    name: Lint + Unit + Feature Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: cookease_test
          MYSQL_USER: cookease
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: rootsecret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -prootsecret"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, mbstring, zip, bcmath, gd, intl
          coverage: none
          tools: composer:v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build front-end assets
        run: npm run build

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -prootsecret --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: cookease_test
          DB_USERNAME: cookease
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Check code style (Laravel Pint)
        run: vendor/bin/pint --test

      - name: Run tests (Pest)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: cookease_test
          DB_USERNAME: cookease
          DB_PASSWORD: secret
          GROQ_API_KEY: fake-key-for-ci
          PIXABAY_API_KEY: fake-key-for-ci
        run: vendor/bin/pest

  docker-build:
    name: Build Docker image (smoke test)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cookease:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
