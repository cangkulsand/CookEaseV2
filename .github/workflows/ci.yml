name: CI

on:
  push:
    branches: ["**"]      # run on every branch push
  pull_request:
    branches: [main]      # run on PRs targeting main

env:
  # Silence the "Node.js 20 deprecated" warning until GitHub flips the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint + Unit + Feature Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, mbstring, zip, bcmath, gd, intl
          coverage: none
          tools: composer:v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Build front-end assets
        run: npm run build

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style (Laravel Pint) — informational only
        run: vendor/bin/pint --test
        continue-on-error: true

      - name: Run tests (Pest)
        env:
          GROQ_API_KEY: fake-key-for-ci
          PIXABAY_API_KEY: fake-key-for-ci
        run: vendor/bin/pest

  docker-build:
    name: Build Docker image (smoke test)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cookease:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
