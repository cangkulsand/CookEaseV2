services:
  app:
    build: .
    image: cookease:dev
    container_name: cookease-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: cookease
      DB_USERNAME: cookease
      DB_PASSWORD: secret
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www                       # live-mount your code into the container (dev mode)
      - /var/www/vendor                   # keep container's vendor (not host's empty dir)
      - /var/www/node_modules             # keep container's node_modules (not host's empty dir)
      - /var/www/public/build             # keep container's Vite-built assets (rebuild with `npm run build`)
    networks: [cookease]

  mysql:
    image: mysql:8.0
    container_name: cookease-mysql
    environment:
      MYSQL_DATABASE: cookease
      MYSQL_USER: cookease
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - cookease-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cookease]

  mailpit:
    image: axllent/mailpit:latest
    container_name: cookease-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP (used by the app)
      - "8025:8025"   # Web UI (open in your browser)
    networks: [cookease]

volumes:
  cookease-mysql-data:

networks:
  cookease:
    driver: bridge
